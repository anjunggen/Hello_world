<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>7초 순발력 게임</title>
    <style>
        body { margin: 0; background: #2c3e50; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; color: white; font-family: 'Arial', sans-serif; }
        #timer { font-size: 80px; margin-bottom: 20px; font-weight: bold; }
        button { padding: 15px 30px; font-size: 20px; cursor: pointer; border: none; border-radius: 5px; background: #e74c3c; color: white; transition: 0.3s; }
        button:hover { background: #c0392b; }
        button:disabled { background: #7f8c8d; cursor: not-allowed; }
        #result { margin-top: 20px; font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="timer">0.00</div>
    <button id="btn" onclick="toggleGame()">게임 시작</button>
    <div id="result"></div>

<script>
    let timerInterval;
    let startTime;
    let isRunning = false;
    const timerDisplay = document.getElementById("timer");
    const btn = document.getElementById("btn");
    const resultDisplay = document.getElementById("result");

    function toggleGame() {
        if (!isRunning) {
            // 시작
            isRunning = true;
            btn.innerText = "멈추기!";
            resultDisplay.innerText = "";
            startTime = Date.now();
            timerInterval = setInterval(() => {
                let elapsed = (Date.now() - startTime) / 1000;
                timerDisplay.innerText = elapsed.toFixed(2);
            }, 10);
        } else {
            // 멈추기
            isRunning = false;
            clearInterval(timerInterval);
            btn.innerText = "다시 하기";
            
            let finalTime = parseFloat(timerDisplay.innerText);
            let diff = Math.abs(finalTime - 7.00);
            
            if (diff <= 0.1) {
                resultDisplay.innerText = "퍼펙트! 당신의 순발력은 최고입니다!";
                resultDisplay.style.color = "#2ecc71";
            } else if (diff <= 0.5) {
                resultDisplay.innerText = "아깝습니다! 7초에 아주 근접했어요.";
                resultDisplay.style.color = "#f1c40f";
            } else {
                resultDisplay.innerText = "다시 도전해보세요!";
                resultDisplay.style.color = "#e74c3c";
            }
        }
    }
</script>
</body>
</html>
